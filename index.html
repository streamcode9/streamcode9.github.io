<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <meta name="author" content="streamcode9" />
    <title>streamcode9</title>
    <style>
        body {
          background-color: black;
          display: flex;
          flex-direction: column;
	  margin: 0;
        }
	img { width: 248px; height: 115px; }
        canvas {
          border: 1px dashed red;
          height: calc(100vh - 115px - 2px);
        }
        #fps { position: fixed; bottom: 0; right: 0; color: white; }
    </style>
</head>
<body>
    <img src="img/shortparis.png" />
    <canvas id="cnvs"></canvas>
    <div id="fps"></div>

    <script>
 
function main() {
  const canvas = document.querySelector("#cnvs");
  // Initialize the GL context
  const gl = canvas.getContext("webgl");

  // Only continue if WebGL is available and working
  if (gl === null) {
    alert("Unable to initialize WebGL. Your browser or machine may not support it.");
    return;
  }

  // Set clear color to black, fully opaque
  gl.clearColor(0.0, 0.0, 0.0, 1.0);
  // Clear the color buffer with specified clear color
  gl.clear(gl.COLOR_BUFFER_BIT);
}
        
function drawFPS(x) {
  document.querySelector("#fps").innerHTML = x;
}

function measure() {
	let then = performance.now();

	const loop = () => {
        const now = performance.now();
        const elapsed = now - then;
	    then = now;	
        if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
        requestAnimationFrame(loop);
	};
    requestAnimationFrame(loop);
}

window.onload = () => { main(); measure(); }

    </script>
</body>
