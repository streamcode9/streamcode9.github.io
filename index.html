<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />

    <title>streamcode9</title>
    <style>
        body {
          background-color: black;
          display: flex;
          flex-direction: column;
	  margin: 0;
        }
	img { width: 248px; height: 115px; }
        svg {
          border: 1px dashed red;
          height: calc(100vh - 115px - 2px);
        }
        #fps { position: fixed; bottom: 0; right: 0; color: white; }
    </style>
</head>
<body>
    <img src="img/shortparis.png" />
    <svg>
    </svg>
    <div id="fps"></div>

    <script>
function drawFPS(x) {
  document.querySelector("#fps").innerHTML = x;
}

function measure() {
	let then = performance.now();

	const loop = () => {
        const now = performance.now();
        const elapsed = now - then;
	    then = now;	
        if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
        requestAnimationFrame(loop);
	};
    requestAnimationFrame(loop);
}

window.onload = () => { measure(); }

    </script>
</body>
