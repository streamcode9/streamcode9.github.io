<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
<meta name="description" content="" />
<meta name="author" content="streamcode9" />
<title>streamcode9</title>
<style>
body {
  background-color: black;
  margin: 0;
  width:100vw; height:100vh;
}
.images { display: flex; overflow: hidden; }
.images > img { height: 115px; }
svg {
  border: 1px dashed red;
  height: calc(100vh - 115px - 4px);
  width: calc(100vw - 4px);
}
svg > text { font-size: 0.25rem; fill: white; }
#fps { position: fixed; bottom: 0; right: 0; color: white; }
</style>
</head>
<body>
<div class="images">
<img src="img/shortparis.png" />
<img src="img/benholly.png" />
<img src="img/peppa.png" />
<img src="img/spongebob.png" />
<img src="img/octonauts.png" />
</div>
<svg id="svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="transparent" stroke="blue" />
<text x="0" y="5">🤯 ➫ 🤬 ➫ 😭 ➫ 🤒 ➫ ☠️</text>
<text x="0" y="10">🏋️‍ ➫ 🤡 ➫ ☯️</text>
</svg>
<div id="fps"></div>
<script>
const drawFPS = x => { document.querySelector("#fps").innerHTML = x }

const measure = () => {
  let then = performance.now()

  const loop = () => {
    const now = performance.now()
    const elapsed = now - then
    then = now;
    if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}

const itemsTree = [
  {txt: 'health', items: ['разминка']},
  {txt: 'lang',   items: ['Norsk English']},
  {txt: 'books',  items: ['Гоголь Адамс', 'Бомбар Попов Амосов', 'Франкл Altshuller']},
  {txt: 'music',  items: ['5`NIZZA Pur:Pur My Michelle Voice Канцлер Ги', 'Радик Тюлюш Высоцкий UKE']},
  {txt: 'физика', items: ['постоянная Планка']},
  {txt: 'art',    items: ['Рерих Горный пейзаж дуб']},
  {txt: 'travel', items: ['Nordic countries Japan Italy']},
  {txt: 'code',   items: [
                          'software-design n2o.cs youtube',
                          'SmallTalk Erl Lisp Forth F# System-F'
                         ]},
]

const drawItem = (svg, x, y, txt) => svg.innerHTML += `<text x="${x}" y="${y}">${txt}</text>`

const drawItems = (svg, calcX, calcY, txts) => txts.forEach((txt, i) => drawItem(svg, calcX(i), calcY(i), txt))

const drawNode = (svg, txt, items, xText, xItems, yNode, itemHeight) => {
  drawItem(svg, xText, yNode, txt)
  drawItems(svg, _ => xItems, yItem => yNode + yItem * itemHeight, items)
}
      
const drawTree = (svg, nodes) => nodes.reduce((acc, val, i) => {
  const node = nodes[i]
  const yOffset = 15
  const itemHeight = 5
  const y = acc
  const xText = 0
  const xItems = 20
  drawNode(svg, node.txt, node.items, xText, xItems, yOffset + y, itemHeight)
  return acc + node.items.length * itemHeight
}, 0)

window.onload = () => { measure(); drawTree(document.getElementById('svg'), itemsTree) }

</script>
</body>
