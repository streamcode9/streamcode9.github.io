<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Life. Universe. Everything." />
<meta name="author" content="streamcode9" />
<title>Life. Universe. Everything.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=PT+Sans&display=swap');
body {
  background-color: black; color: white;
  margin: 0; width: 100vw; height: 100vh;
  font-family: 'PT+Sans', sans-serif;
}
#app {
  display: grid; grid-template-columns: 1fr 1fr;
  border: 1px dashed red;
  height: 100%; width: 100%;
}
#fps { position: fixed; bottom: 0; right: 0; color: white; }
</style>
</head>
<body>
<div id="app">
<div>🤯 ➫ 🤬 ➫ 😭 ➫ 🤒 ➫ ☠️</div>
<div>🏋️‍ ➫ 🤡 ➫ ☯️</div>
</div>
<div id="fps"></div>
<script>
const drawFPS = x => { document.querySelector("#fps").innerHTML = x }

const measure = () => {
  let then = performance.now()

  const loop = () => {
    const now = performance.now()
    const elapsed = now - then
    then = now;
    if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}

const appElem = document.getElementById('app')

const item = (txt, items, link) => ({txt, items, link})

const itemsTreeScience = [
  item('----', ['Кеплер Коперник']),
  item('----', ['Бомбар Попов Семихатов Саватеев Амосов Альтшуллер']),
]

const itemsTree = [
  {txt: 'health',   items: ['сустав жим прогиб грасана собака шавасана']},
  {txt: 'books',    items: ['Гоголь Булгаков Адамс Роулинг Толкиен']},
  {txt: 'music',    items: ['Кирилл Рихтер Erik Satie Канцлер Ги Земфира Цой 5`NIZZA Shortparis Радик Тюлюш Высоцкий']},
  {txt: 'movies',   items: ['36 ступеней shinobi жмурки dark knight true detective tarantino fight club']},
  {txt: 'code',     items: ['https://github.com/streamcode9/software-design']},
  {txt: '🔭',       link: itemsTreeScience },
]

const drawLink = (app, txt, link) => {
  const handler = () => {
    app.innerHTML = ''
    drawTree(app, link)
  }
  const btn = document.createElement('button')
  btn.addEventListener('click', () => handler())
  btn.textContent = txt
  app.appendChild(btn)
}

const span = txt => {
  const s = document.createElement('span')
  s.textContent = txt
  return s
}

const div = items => {
  const d = document.createElement('div')
  items.forEach(item => d.appendChild(item))
  return d
}

const drawItems = txts => txts.map(txt => span(txt))

const drawNode = (app, {txt, items, link}) => {
  if (link) {
    drawLink(app, txt, link)
  } else {
    app.appendChild(div([span(txt)]))
    app.appendChild(div(drawItems(items)))
  }
}
      
const drawTree = (app, nodes) => nodes.forEach(n => drawNode(app, n))

window.onload = () => { measure(); drawTree(appElem, itemsTree) }

</script>
</body>
