<head>

<style>
body {
  background-color: black;
  margin: 0;
  width:100vw; height:100vh;
}
.images { display: flex; }
.images > img:nth-child(1) { width: 248px; height: 115px; }
.images > img:nth-child(2) { width: 204px; height: 115px; }
.images > img:nth-child(3) { width: 204px; height: 115px; }
.images > img:nth-child(4) { width: 173px; height: 115px; }
svg {
  border: 1px dashed red;
  height: calc(100vh - 115px - 2px);
  width: calc(100vw - 2px);
}
svg > text { font-size: 0.25rem; fill: white; }
#fps { position: fixed; bottom: 0; right: 0; color: white; }
</style>
</head>
<body>
<div class="images">
<img src="img/shortparis.png" />
<img src="img/benholly.png" />
<img src="https://lh3.googleusercontent.com/proxy/e2y1uPGR7p2vM4nlyHBLMMuVzMFq0xILxipgQlo8eaT0zJibOavVKOfRjDpQ6_rZamBrLAXbnzMaQdhUZvVoT-6lofHCDctsvE-P-2UCKGWKnpnLuShhKtU5mrnM7Q" />
<img src="https://static01.nyt.com/images/2018/05/03/us/03spongebob_xp/03spongebob_xp-articleLarge.jpg?quality=75&auto=webp&disable=upscale" />
</div>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="transparent" stroke="blue" />
<text x="0" y="5">🤯 ➫ 🤬 ➫ 😭 ➫ 🤒 ➫ ☠️</text>
<text x="0" y="15">🏋️‍ ➫ 🤡 ➫ ☯️</text>
<text x="0" y="25">Физика: фотон/волна, квантовая теория, постоянная Планка, эффект замедления времени, гравитация</text>
<text x="0" y="35">Музыка</text>
<text x="100" y="100">?</text>
</svg>
<div id="fps"></div>
<script>
function drawFPS(x) {
  document.querySelector("#fps").innerHTML = x;
}

function measure() {
  let then = performance.now();

  const loop = () => {
    const now = performance.now();
    const elapsed = now - then;
    then = now;	
    if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}

window.onload = () => { measure(); }

</script>
</body>
