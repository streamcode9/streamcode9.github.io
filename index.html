<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Life. Universe. Everything." />
<meta name="author" content="streamcode9" />
<title>Life. Universe. Everything.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=PT+Sans&display=swap');
body {
  background-color: black;
  margin: 0;
  width: 100vw; height: 100vh;
  font-family: 'PT+Sans', sans-serif;
}
.images { display: flex; overflow: hidden; }
.images > img { height: 115px; }
svg {
  border: 1px dashed red;
  height: calc(100vh - 115px - 4px);
  width: calc(100vw - 4px);
}
svg > text { font-size: 0.25rem; fill: white; }
#fps { position: fixed; bottom: 0; right: 0; color: white; }
</style>
</head>
<body>
<svg id="svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="transparent" stroke="blue" />
<text x="0" y="5">🤯 ➫ 🤬 ➫ 😭 ➫ 🤒 ➫ ☠️</text>
<text x="0" y="10">🏋️‍ ➫ 🤡 ➫ ☯️</text>
</svg>
<div id="fps"></div>
<script>
const drawFPS = x => { document.querySelector("#fps").innerHTML = x }

const measure = () => {
  let then = performance.now()

  const loop = () => {
    const now = performance.now()
    const elapsed = now - then
    then = now;
    if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}

const svgElem = document.getElementById('svg')

const item = (txt, items, link) => ({txt, items, link})

const itemsTreeScience = [
  item('----', ['Кеплер Коперник']),
]

const itemsTree = [
  {txt: 'health',   items: ['сустав жим прогиб грасана собака шавасана']},
  {txt: 'books',    items: ['Гоголь Адамс Роулинг Толкиен', 'Бомбар Попов Амосов', 'Франкл Альтшуллер']},
  {txt: 'music',    items: ['Канцлер Ги Земфира Цой', '5`NIZZA Shortparis', 'Радик Тюлюш Высоцкий']},
  {txt: 'country',  items: ['Nordic Japan Italy Nepal']},
  {txt: 'movies',   items: ['жмурки dark knight','true detective tarantino', 'revenant matrix','fight club dead poet']},
  {txt: '🔭',       link: itemsTreeScience },
]

const drawLink = (svg, x, y, txt, link) => {
  const handler = () => {
    svg.innerHTML = ''
    drawTree(svg, link)
  }
  const textNode = document.createElementNS("http://www.w3.org/2000/svg", 'text')
  textNode.addEventListener('click', () => handler())
  textNode.setAttribute('x', x+20)
  textNode.setAttribute('y', y)
  textNode.textContent = txt
  svg.appendChild(textNode)
}

const drawItem = (svg, x, y, txt) => svg.innerHTML += `<text x="${x}" y="${y}">${txt}</text>`

const drawItems = (svg, calcX, calcY, txts) => txts.forEach((txt, i) => drawItem(svg, calcX(i), calcY(i), txt))

const drawNode = (svg, xText, xItems, yNode, itemHeight, {txt, items, link}) => {
  if (link) {
    drawLink(svg, xText, yNode, txt, link)
  } else {
    drawItem(svg, xText, yNode, txt)
    drawItems(svg, _ => xItems, yItem => yNode + yItem * itemHeight, items)
  }
}
      
const drawTree = (svg, nodes) => nodes.reduce((acc, val, i) => {
  const node = nodes[i]
  const yOffset = 15
  const itemHeight = 5
  const y = acc
  const xText = 0
  const xItems = 20
  drawNode(svg, xText, xItems, yOffset + y, itemHeight, node)
  return acc + node.items.length * itemHeight
}, 0)

window.onload = () => { measure(); drawTree(svgElem, itemsTree) }

</script>
</body>
