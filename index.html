<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
<meta name="description" content="" />
<meta name="author" content="streamcode9" />
<title>streamcode9</title>
<style>
body {
  background-color: black;
  margin: 0;
  width:100vw; height:100vh;
}
.images { display: flex; }
.images > img { height: 115px; }
svg {
  border: 1px dashed red;
  height: calc(100vh - 115px - 4px);
  width: calc(100vw - 4px);
}
svg > text { font-size: 0.25rem; fill: white; }
#fps { position: fixed; bottom: 0; right: 0; color: white; }
</style>
</head>
<body>
<div class="images">
<img src="img/shortparis.png" />
<img src="img/benholly.png" />
<img src="img/peppa.png" />
<img src="img/spongebob.png" />
<img src="img/octonauts.png" />
</div>
<svg id="svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="transparent" stroke="blue" />
<text x="0" y="5">🤯 ➫ 🤬 ➫ 😭 ➫ 🤒 ➫ ☠️</text>
<text x="0" y="10">🏋️‍ ➫ 🤡 ➫ ☯️</text>
</svg>
<div id="fps"></div>
<script>
const drawFPS = x => { document.querySelector("#fps").innerHTML = x }

const measure = () => {
  let then = performance.now()

  const loop = () => {
    const now = performance.now()
    const elapsed = now - then
    then = now;
    if (now % 9 === 0) drawFPS((1000 / elapsed).toPrecision(3));
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}

const itemsTree = [
  {txt: 'books',  items: ['Гоголь Дуглас Адамс Толкиен Пелевин', 'Ален Бомбар']},
  {txt: 'music',  items: ['ОксиМирон Монеточка Канцлер Ги Радик Тюлюш Высоцкий']},
  {txt: 'физика', items: ['фотон/волна, квантовая теория, постоянная Планка, эффект замедления времени, гравитация']},
  {txt: 'art',    items: ['Рерих Горный пейзаж']},
  {txt: 'travel', items: ['Nordic countries, Japan, Italy']},
  {txt: 'code',   items: ['Пиксели С C++ Rust SDL Go Erl Lisp F# System F Formality']},
]

const drawItem = (el, x, y, txt) => el.innerHTML += `<text x="${x}" y="${y}">${txt}</text>`

const drawItems = (el, calcX, calcY, txts) => txts.forEach((txt, i) => drawItem(el, calcX(i), calcY(i), txt))

const id = x => x

const main = () => {
  const offsetY = 15
  const svg = document.getElementById('svg')
  for (let i = 0; i < itemsTree.length; i++) {
    let y = offsetY + i * 5
    drawItem(svg, 0, y, itemsTree[i].txt)
    drawItems(svg, id, _ => y, itemsTree[i].items)
  }
}

window.onload = () => { measure(); main(); }

</script>
</body>
